name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: doda-browser-linux-x86_64.tar.bz2
            build-dir: obj-release

          - os: windows-latest
            artifact: doda-browser-windows-x86_64.zip
            build-dir: obj-release

          - os: macos-latest
            artifact: doda-browser-macos-universal.tar.bz2
            build-dir: obj-release

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Doda source
        uses: actions/checkout@v4
        with:
          path: doda

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm mercurial \
            libgtk-3-dev libasound2-dev libpulse-dev \
            libx11-xcb-dev libx11-dev libxcb-shm0-dev \
            libxext-dev libxrandr-dev libxcomposite-dev \
            libxcursor-dev libxdamage-dev libxi-dev \
            libxt-dev libpango1.0-dev libfontconfig1-dev \
            nasm
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          cargo install cbindgen

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install mercurial nasm
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          cargo install cbindgen

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mercurial nasm python3
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          cargo install cbindgen

      - name: Clone mozilla-unified
        run: |
          hg clone --stream https://hg.mozilla.org/mozilla-central firefox-source
          cd firefox-source

      - name: Apply Doda overlay
        run: |
          cp -a doda/source/* firefox-source/
          cp doda/mozconfig-release firefox-source/mozconfig-release

      - name: Bootstrap (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd firefox-source
          MOZCONFIG=mozconfig-release ./mach bootstrap --application-choice=browser --no-interactive

      - name: Bootstrap (Windows)
        if: runner.os == 'Windows'
        run: |
          cd firefox-source
          MOZCONFIG=mozconfig-release ./mach bootstrap --application-choice=browser --no-interactive

      - name: Build
        run: |
          cd firefox-source
          MOZCONFIG=mozconfig-release ./mach build 2>&1

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd firefox-source/${{ matrix.build-dir }}/dist/bin
          tar cjf ../../../../doda-browser-linux-x86_64.tar.bz2 .
          cd ../../../..
          sha256sum doda-browser-linux-x86_64.tar.bz2 > doda-browser-linux-x86_64.tar.bz2.sha256

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd firefox-source/${{ matrix.build-dir }}/dist/bin
          tar cjf ../../../../doda-browser-macos-universal.tar.bz2 .
          cd ../../../..
          shasum -a 256 doda-browser-macos-universal.tar.bz2 > doda-browser-macos-universal.tar.bz2.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd firefox-source/${{ matrix.build-dir }}/dist/bin
          7z a ../../../../doda-browser-windows-x86_64.zip .
          cd ../../../..
          certutil -hashfile doda-browser-windows-x86_64.zip SHA256 > doda-browser-windows-x86_64.zip.sha256

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            doda-browser-*
            doda-browser-*.sha256
