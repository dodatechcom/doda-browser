name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          path: doda

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y mercurial nasm \
            libgtk-3-dev libasound2-dev libpulse-dev \
            libx11-xcb-dev libx11-dev libxcb-shm0-dev \
            libxext-dev libxrandr-dev libxcomposite-dev \
            libxcursor-dev libxdamage-dev libxi-dev \
            libxt-dev libpango1.0-dev libfontconfig1-dev \
            libdbus-glib-1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Setup clang
        run: |
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04.tar.xz -O /tmp/clang.tar.xz
          tar xf /tmp/clang.tar.xz -C /tmp
          echo "/tmp/clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04/bin" >> $GITHUB_PATH

      - name: Clone mozilla-central
        run: |
          hg clone --stream https://hg.mozilla.org/mozilla-central firefox-source
          cd firefox-source
          hg update -r 71e37c8757f87e7682d7db7d9b9ec9f7f81e24f7

      - name: Apply Doda overlay
        run: |
          cp -a doda/source/* firefox-source/
          cp firefox-source/mozconfig-release-linux firefox-source/mozconfig

      - name: Build
        run: |
          cd firefox-source
          cargo fetch
          ./mach build 2>&1

      - name: Package
        run: |
          cd firefox-source/obj-release/dist/bin
          tar cjf ../../../../doda-browser-linux-x86_64.tar.bz2 \
            --exclude="*.o" --exclude="*.a" .
          cd ../../../../

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: doda-linux
          path: doda-browser-linux-x86_64.tar.bz2

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          path: doda

      - name: Install deps
        run: |
          # Upgrade chocolatey itself
          choco upgrade chocolatey -y --no-progress
          # Install mercurial via pip (Python is pre-installed on the runner)
          pip install mercurial
          # Install remaining tools via choco
          foreach ($pkg in @("nasm", "python3")) {
            $attempt = 0
            do {
              Write-Host "Installing $pkg (attempt $($attempt + 1)/3)..."
              & choco install $pkg --yes --no-progress
              if ($LASTEXITCODE -eq 0) { break }
              $attempt++
              if ($attempt -lt 3) { Start-Sleep -Seconds 10 }
            } while ($attempt -lt 3)
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to install $pkg after 3 attempts"
              exit 1
            }
          }
          # Download and install MozillaBuild (not available on Chocolatey)
          Write-Host "Downloading MozillaBuild..."
          $url = "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe"
          $out = "$env:TEMP\MozillaBuildSetup.exe"
          (New-Object System.Net.WebClient).DownloadFile($url, $out)
          Write-Host "Installing MozillaBuild..."
          Start-Process -Wait -FilePath $out -ArgumentList "/S /D=C:\mozilla-build"
          Write-Host "MozillaBuild installed"
        shell: powershell

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Clone mozilla-central
        run: |
          hg clone --stream https://hg.mozilla.org/mozilla-central firefox-source
          cd firefox-source
          hg update -r 71e37c8757f87e7682d7db7d9b9ec9f7f81e24f7

      - name: Apply Doda overlay
        run: |
          xcopy /E /I doda\source\* firefox-source\
          copy firefox-source\mozconfig-release-windows firefox-source\mozconfig
        shell: cmd

      - name: Build
        run: |
          cd firefox-source
          cargo fetch
          ./mach build 2>&1

      - name: Package
        run: |
          cd firefox-source/obj-release/dist/bin
          7z a ../../../../doda-browser-windows-x86_64.zip *
          cd ../../../../

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: doda-windows
          path: doda-browser-windows-x86_64.zip

  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          path: doda

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y mercurial nasm openjdk-17-jdk \
            libgtk-3-dev libasound2-dev libpulse-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Setup clang
        run: |
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04.tar.xz -O /tmp/clang.tar.xz
          tar xf /tmp/clang.tar.xz -C /tmp
          echo "/tmp/clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04/bin" >> $GITHUB_PATH

      - name: Clone mozilla-central
        run: |
          hg clone --stream https://hg.mozilla.org/mozilla-central firefox-source
          cd firefox-source
          hg update -r 71e37c8757f87e7682d7db7d9b9ec9f7f81e24f7

      - name: Apply Doda overlay
        run: |
          cp -a doda/source/* firefox-source/
          cp firefox-source/mozconfig-release-android firefox-source/mozconfig

      - name: Bootstrap Android SDK
        run: |
          cd firefox-source
          yes "" | ./mach bootstrap --application="GeckoView/Firefox for Android" 2>&1
          # Use the Android SDK that bootstrap already installed
          ANDROID_SDK_ROOT=$HOME/.mozbuild/android-sdk-linux
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/20.0/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            echo "ERROR: sdkmanager not found at $SDKMANAGER"
            find "$HOME/.mozbuild" -name "sdkmanager" -type f 2>/dev/null
            exit 1
          fi
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "Using sdkmanager: $SDKMANAGER"
          # Install NDK r29 (sdkmanager too old to know about it, download directly)
          echo "Downloading NDK r29 directly..."
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O /tmp/ndk-r29.zip
          mkdir -p "$ANDROID_SDK_ROOT/ndk"
          unzip -q /tmp/ndk-r29.zip -d "$ANDROID_SDK_ROOT/ndk/"
          if [ -d "$ANDROID_SDK_ROOT/ndk/android-ndk-r29" ]; then
            mv "$ANDROID_SDK_ROOT/ndk/android-ndk-r29" "$ANDROID_SDK_ROOT/ndk/29.0.0"
          fi
          if [ -d "$ANDROID_SDK_ROOT/ndk/29.0.0" ]; then
            echo "NDK r29 installed successfully"
            echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/29.0.0" >> $GITHUB_ENV
          else
            echo "ERROR: NDK r29 installation failed"
            ls -la "$ANDROID_SDK_ROOT/ndk/" 2>/dev/null
            exit 1
          fi

      - name: Build GeckoView
        run: |
          cd firefox-source
          cargo fetch
          ./mach build 2>&1

      - name: Package
        run: |
          cd firefox-source/obj-release-android/dist/
          tar cjf ../../../doda-browser-android-aarch64.tar.bz2 \
            --exclude="*.o" --exclude="*.a" .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: doda-android
          path: doda-browser-android-aarch64.tar.bz2

  create-release:
    needs: [build-linux, build-windows, build-android]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate checksums
        run: |
          sha256sum doda-linux/doda-browser-linux-x86_64.tar.bz2 > doda-browser-linux-x86_64.tar.bz2.sha256
          sha256sum doda-windows/doda-browser-windows-x86_64.zip > doda-browser-windows-x86_64.zip.sha256
          sha256sum doda-android/doda-browser-android-aarch64.tar.bz2 > doda-browser-android-aarch64.tar.bz2.sha256
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            doda-linux/doda-browser-linux-x86_64.tar.bz2
            doda-windows/doda-browser-windows-x86_64.zip
            doda-android/doda-browser-android-aarch64.tar.bz2
            doda-browser-linux-x86_64.tar.bz2.sha256
            doda-browser-windows-x86_64.zip.sha256
            doda-browser-android-aarch64.tar.bz2.sha256
          generate_release_notes: true
