name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          path: doda

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y mercurial nasm \
            libgtk-3-dev libasound2-dev libpulse-dev \
            libx11-xcb-dev libx11-dev libxcb-shm0-dev \
            libxext-dev libxrandr-dev libxcomposite-dev \
            libxcursor-dev libxdamage-dev libxi-dev \
            libxt-dev libpango1.0-dev libfontconfig1-dev \
            libdbus-glib-1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Setup clang
        run: |
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04.tar.xz -O /tmp/clang.tar.xz
          tar xf /tmp/clang.tar.xz -C /tmp
          echo "/tmp/clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04/bin" >> $GITHUB_PATH

      - name: Clone mozilla-unified
        run: hg clone --stream https://hg.mozilla.org/mozilla-central firefox-source

      - name: Apply Doda overlay
        run: |
          cp -a doda/source/* firefox-source/
          cp firefox-source/mozconfig-release-linux firefox-source/mozconfig

      - name: Build
        run: |
          cd firefox-source
          ./mach build 2>&1

      - name: Package
        run: |
          cd firefox-source/obj-release/dist/bin
          tar cjf ../../../../doda-browser-linux-x86_64.tar.bz2 \
            --exclude="*.o" --exclude="*.a" .
          cd ../../../../

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: doda-linux
          path: doda-browser-linux-x86_64.tar.bz2

  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          path: doda

      - name: Install deps
        run: brew install mercurial nasm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Clone mozilla-unified
        run: hg clone --stream https://hg.mozilla.org/mozilla-central firefox-source

      - name: Apply Doda overlay
        run: |
          cp -a doda/source/* firefox-source/
          cp firefox-source/mozconfig-release-macos firefox-source/mozconfig

      - name: Build
        run: |
          cd firefox-source
          ./mach build 2>&1

      - name: Package
        run: |
          cd firefox-source/obj-release/dist/bin
          tar cjf ../../../../doda-browser-macos-universal.tar.bz2 \
            --exclude="*.o" --exclude="*.a" .
          cd ../../../../

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: doda-macos
          path: doda-browser-macos-universal.tar.bz2

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          path: doda

      - name: Install deps
        run: |
          choco install mercurial nasm python3 -y

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Clone mozilla-unified
        run: hg clone --stream https://hg.mozilla.org/mozilla-central firefox-source

      - name: Apply Doda overlay
        run: |
          xcopy /E /I doda\source\* firefox-source\
          copy firefox-source\mozconfig-release-windows firefox-source\mozconfig
        shell: cmd

      - name: Build
        run: |
          cd firefox-source
          ./mach build 2>&1

      - name: Package
        run: |
          cd firefox-source/obj-release/dist/bin
          7z a ../../../../doda-browser-windows-x86_64.zip *
          cd ../../../../

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: doda-windows
          path: doda-browser-windows-x86_64.zip

  create-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate checksums
        run: |
          sha256sum doda-linux/doda-browser-linux-x86_64.tar.bz2 > doda-browser-linux-x86_64.tar.bz2.sha256
          sha256sum doda-macos/doda-browser-macos-universal.tar.bz2 > doda-browser-macos-universal.tar.bz2.sha256
          sha256sum doda-windows/doda-browser-windows-x86_64.zip > doda-browser-windows-x86_64.zip.sha256
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            doda-linux/doda-browser-linux-x86_64.tar.bz2
            doda-macos/doda-browser-macos-universal.tar.bz2
            doda-windows/doda-browser-windows-x86_64.zip
            doda-browser-linux-x86_64.tar.bz2.sha256
            doda-browser-macos-universal.tar.bz2.sha256
            doda-browser-windows-x86_64.zip.sha256
          generate_release_notes: true
